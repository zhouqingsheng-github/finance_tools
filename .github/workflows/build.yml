name: Build & Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # 手动触发

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash    # 统一用 bash，避免 PowerShell cd 行为不一致
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ====== 下载 Python Embeddable（内嵌到 exe 中）======
      - name: Cache Python Embedded
        id: cache-python
        uses: actions/cache@v4
        with:
          path: python-embed
          key: python311-embed-windows-${{ runner.os }}
          
      - name: Download & Setup Python Embedded
        if: steps.cache-python.outputs.cache-hit != 'true'
        run: |
          echo "=== Downloading Python 3.11 Embeddable ==="
          curl -L -o python-311-embed.zip "https://www.python.org/ftp/python/3.11.9/python-3.11.9-embed-amd64.zip"
          mkdir -p python-embed
          unzip -q python-311-embed.zip -d python-embed
          rm python-311-embed.zip

      - name: Install pip in Python Embedded
        run: |
          echo "=== Installing get-pip.py ==="
          curl -L -o python-embed/get-pip.py "https://bootstrap.pypa.io/get-pip.py"
          python-embed/python.exe python-embed/get-pip.py --no-warn-script-location
          rm python-embed/get-pip.py

          echo "=== Enable site-packages (uncomment import site) ==="
          # Python Embeddable 默认注释了 import site，导致 pip 安装后无法使用
          sed -i 's/^#import site/import site/' python-embed/python311._pth

          echo "=== Installing project dependencies ==="
          python-embed/python.exe -m pip install --upgrade pip
          python-embed/python.exe -m pip install -r python/requirements.txt

      - name: Copy Python runtime to resources
        run: |
          mkdir -p resources/python-runtime/
          cp -r python-embed/* resources/python-runtime/
          echo "Python runtime size:"
          du -sh resources/python-runtime/

      # ====== 前端依赖 ======
      - name: Install frontend dependencies
        run: |
          npm install
          (cd src && npm install)

      # ====== 安装 Playwright（打包进 exe，指定安装目录到 resources/）======
      - name: Install Playwright browsers (packaged)
        run: |
          # 指定安装目录到 resources/ms-playwright/，随 extraResources 一起打包进 exe
          PLAYWRIGHT_BROWSERS_PATH="$PWD/resources/ms-playwright" \
            resources/python-runtime/python.exe -m playwright install chromium
          echo "Playwright browser size:"
          du -sh resources/ms-playwright/

      - name: Build (Windows EXE)
        env:
          GH_TOKEN: ""
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: QingFlow-Windows-x64-${{ github.sha }}
          path: release/*.exe
          retention-days: 30

  build-macos:
    name: build-macos-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: macos-15-intel
            build_script: build:mac:x64
#          - arch: arm64
#            runner: macos-latest
#            build_script: build:mac:arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Node dependencies
        run: |
          npm install
          (cd src && npm install)

      - name: Create packaged Python runtime
        run: |
          python -m venv resources/python-runtime
          resources/python-runtime/bin/python -m pip install --upgrade pip
          resources/python-runtime/bin/python -m pip install -r python/requirements.txt
          echo "Python runtime arch:"
          resources/python-runtime/bin/python -c "import platform; print(platform.machine())"
          echo "Python runtime size:"
          du -sh resources/python-runtime/

      - name: Install Playwright browsers (packaged)
        run: |
          # 指定安装目录到 resources/ms-playwright/，随 extraResources 一起打包进 DMG
          PLAYWRIGHT_BROWSERS_PATH="$PWD/resources/ms-playwright" \
            resources/python-runtime/bin/python -m playwright install chromium
          echo "Playwright browser size:"
          du -sh resources/ms-playwright/

      - name: Build (macOS ${{ matrix.arch }} DMG)
        run: |
          for attempt in 1 2 3; do
            echo "=== macOS DMG build attempt ${attempt}/3 ==="
            if npm run ${{ matrix.build_script }}; then
              exit 0
            fi

            status=$?
            echo "Build attempt ${attempt} failed with exit code ${status}."
            echo "Cleaning up mounted disk images before retry..."
            hdiutil info || true
            osascript -e 'tell application "Finder" to quit' || true
            for disk in $(hdiutil info | awk '/^\/dev\/disk/ { print $1 }'); do
              hdiutil detach "$disk" -force || true
            done
            sleep 15
          done

          exit ${status:-1}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FinanceTools-macOS-${{ matrix.arch }}-${{ github.sha }}
          path: release/*.dmg
          retention-days: 30
